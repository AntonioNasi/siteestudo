<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Focus Study</title>

<link rel="stylesheet" href="style.css">

</head>


<body>
    <div class="container">

        <button id="focusModeBtn" onclick="toggleFocusMode()">
Modo foco
</button>

       


<h1>Focus Study</h1>

<p class="subtitle">
Sala de estudos
</p>


<div class="study-info">

<input 
id="subject"
placeholder="O que você vai estudar?"
>


</div>



<div class="timer-box">


<div class="timer">

<span id="minutes">
35
</span>

:

<span id="seconds">
00
</span>


</div>



<p id="status">
Preparado para estudar
</p>


<p id="cycle">
Ciclo 0/3
</p>


</div>




<div class="config">


<label>
Pomodoro

<input 
id="studyTime"
type="number"
value="35">

</label>



<label>
Pausa

<input 
id="breakTime"
type="number"
value="5">

</label>



<label>
Ciclos

<input 
id="cycles"
type="number"
value="3">

</label>


</div>




<div class="buttons">


<button onclick="startTimer()">
▶ Iniciar
</button>


<button onclick="pauseTimer()">
⏸ Pausar
</button>


<button onclick="resetTimer()">
↻ Reiniciar
</button>



</div>




<section class="ambiente">


<h2>
Ambiente
</h2>


<div class="ambiente-buttons">


<button>
🎧 Lo-fi
</button>


<button>
🌧 Chuva
</button>


<button>
📚 Biblioteca
</button>



</div>



<h2>
Vídeos
</h2>


<div id="videos" class="videos">

</div>


</section>





<button 
id="exitFocus"
onclick="toggleFocusMode()">

Sair do modo foco

</button>

    </div>

    


    <script src="script.js"></script>

</body>

</html>
